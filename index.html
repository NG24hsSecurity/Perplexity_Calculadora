<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Historial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .calculator {
            display: flex;
            flex-direction: column;
        }
        #input, #output {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #input { background: #f8f9fa; }
        #output { 
            background: #343a40; 
            color: white; 
            text-align: right;
            font-size: 24px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .num { background: #e9ecef; }
        .op { background: #007bff; color: white; }
        .eq { background: #28a745; color: white; grid-column: span 2; }
        .clear { background: #dc3545; color: white; }
        button:hover { transform: scale(1.05); }
        .history {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .history h4 { margin: 0 0 10px 0; color: #495057; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover { background: #e9ecef; }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <input type="text" id="input" placeholder="Ingresa tu expresión...">
            <input type="text" id="output" placeholder="Resultado" disabled>
            <div class="buttons">
                <button class="num" onclick="append('7')">7</button>
                <button class="num" onclick="append('8')">8</button>
                <button class="num" onclick="append('9')">9</button>
                <button class="op" onclick="append('/')">/</button>
                <button class="num" onclick="append('4')">4</button>
                <button class="num" onclick="append('5')">5</button>
                <button class="num" onclick="append('6')">6</button>
                <button class="op" onclick="append('*')">*</button>
                <button class="num" onclick="append('1')">1</button>
                <button class="num" onclick="append('2')">2</button>
                <button class="num" onclick="append('3')">3</button>
                <button class="op" onclick="append('-')">-</button>
                <button class="num" onclick="append('0')">0</button>
                <button class="num" onclick="append('.')">.</button>
                <button class="eq" onclick="calculate()">=</button>
                <button class="clear" onclick="clearAll()">C</button>
                <button class="op" onclick="append('+')">+</button>
                <button onclick="deleteLast()">DEL</button>
            </div>
        </div>
        <div class="history">
            <h4>Historial</h4>
            <div id="historyContainer"></div>
        </div>
    </div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const historyContainer = document.getElementById('historyContainer');
        const STORAGE_KEY = 'calc_history';

        // Inicializar historial
        if (!localStorage.getItem(STORAGE_KEY)) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
        }
        refreshHistory();

        inputEl.addEventListener('input', updateOutput);

        function append(value) {
            inputEl.value += value;
            updateOutput();
        }

        function updateOutput() {
            try {
                const result = eval(inputEl.value) || '';
                outputEl.value = isNaN(result) ? '' : result;
            } catch {
                outputEl.value = '';
            }
        }

        function calculate() {
            const expr = inputEl.value;
            if (expr) {
                let history = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!history.includes(expr)) {
                    history.unshift(expr); // Agregar al inicio
                    if (history.length > 10) history = history.slice(0, 10); // Máx 10
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                    refreshHistory();
                }
                inputEl.value = outputEl.value;
            }
        }

        function clearAll() {
            inputEl.value = '';
            outputEl.value = '';
        }

        function deleteLast() {
            inputEl.value = inputEl.value.slice(0, -1);
            updateOutput();
        }

        function refreshHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY));
            historyContainer.innerHTML = '';
            history.forEach(expr => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${truncate(expr, 15)}</span><span>${truncate(eval(expr) || 'Error', 10)}</span>`;
                div.onclick = () => {
                    inputEl.value = expr;
                    updateOutput();
                };
                historyContainer.appendChild(div);
            });
        }

        function truncate(str, max) {
            return str.length > max ? str.slice(0, max) + '...' : str;
        }
    </script>
</body>
</html>
